<!DOCTYPE html>
<html>
<head>
    <title>METROMINGLE Sign Up Page</title>
    <link type="text/css" rel="stylesheet" href="style.css">
</head>
<body>
    <section class="imp">
        <section>
            <div class="login show" id="one">
                <div class="textbox slide-left2">
                    <div class="head">
                        <h1>Sign UP to METROMINGLE</h1>
                        <ul>
                            <li><i class="fab fa-facebook-f" style="cursor: pointer;"></i></li>
                            <li><i class="fab fa-google-plus-g" style="cursor: pointer;"></i></li>
                            <li><i class="fab fa-linkedin-in" style="cursor: pointer;"></i></li>
                        </ul>
                        <h3 style="cursor: pointer;">ENTER YOUR DETAILS TO CREATE ACCOUNT</h3>
                    </div>

                    <form id="signupForm" autocomplete="off">
                        <input type="text" name="name" placeholder="NAME" required minlength="2">
                        <input type="email" name="EMAIL" placeholder="EMAIL" required>
                        <input type="password" name="PASSWORD" placeholder="PASSWORD (min 6 characters)" required minlength="6">
                        <input type="tel" name="phoneno" placeholder="PHONE NO. (10 digits)" required pattern="[0-9]{10,}" minlength="10">
                        <button type="submit" class="sign_in_btn">SIGN UP</button>
                    </form>
                </div>
            </div>

            <div class="sec show" id="two">
                <div class="textbox slide-left">
                    <h1>Already a member?</h1>
                    <p>Sign in and start shopping.</p>
                    <button id="b1" style="cursor: pointer;" class="prompt_sign_up">
                        <a href="login-new.html" style="color: white;">SIGN IN</a>
                    </button>
                </div>
            </div>
        </section>
    </section>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = this.querySelector('input[name="name"]').value.trim();
            const EMAIL = this.querySelector('input[name="EMAIL"]').value.trim();
            const PASSWORD = this.querySelector('input[name="PASSWORD"]').value;
            const phoneno = this.querySelector('input[name="phoneno"]').value.trim();

            // Client-side validation
            if (!name || !EMAIL || !PASSWORD || !phoneno) {
                alert('Please fill in all fields');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(EMAIL)) {
                alert('Please enter a valid email address');
                return;
            }

            // Validate password length
            if (PASSWORD.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }

            // Validate phone number
            if (phoneno.length < 10 || !/^\d+$/.test(phoneno)) {
                alert('Please enter a valid phone number (at least 10 digits)');
                return;
            }

            // Disable submit button to prevent double submission
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'SIGNING UP...';

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, EMAIL, PASSWORD, phoneno })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Account created successfully! Redirecting...');
                    window.location.href = 'main1.html';
                } else {
                    alert(data.error || 'Signup failed. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'SIGN UP';
                }
            } catch (error) {
                console.error('Signup error:', error);
                alert('Network error. Please check your connection and try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'SIGN UP';
            }
        });
    </script>
</body>
</html>
